  </text>
  <text x="110" y="494" fill="#384857" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="500">
    whether their experiences overlap with common
  </text>
  <text x="110" y="544" fill="#384857" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="500">
    autistic traits.
  </text>

  <defs>
    <pattern id="bg-grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" stroke="#152330" stroke-opacity="0.32"/>
    </pattern>

    <radialGradient id="amber-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(172 96) rotate(90) scale(180)">
      <stop stop-color="#C57F44" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#C57F44" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="teal-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1028 114) rotate(90) scale(220)">
      <stop stop-color="#0E4E4D" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0E4E4D" stop-opacity="0"/>
    </radialGradient>
  </defs>
